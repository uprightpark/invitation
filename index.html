<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Invitation</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="invitation-container">
        <div class="content">
            <h2 class="sub-title">You're invited to</h2>
            <h1 class="main-title">The Big Birthday</h1>
            <p class="celebration-text">Join us for a magical evening of cake and memories!</p>
            
            <div id="clock">00:00:00:00</div>
            
            <div class="labels">
                <div>DAYS</div>
                <div>HRS</div>
                <div>MIN</div>
                <div>SEC</div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
